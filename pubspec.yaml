name: alarm_app
description: "Aplicación de alarma con cancelación por comando de voz - Práctica 7"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  audioplayers: ^6.6.0
  android_alarm_manager_plus: ^5.0.0
  flutter:
    sdk: flutter
  flutter_foreground_task: ^9.2.2
  flutter_local_notifications: ^21.0.0
  intl: ^0.20.2
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  speech_to_text: ^7.3.0
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  shared_preferences_android: ^2.4.23

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
